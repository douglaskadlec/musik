<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<meta name="author" content="https://douglaskadlec.com">
	<meta name="description" content="A music streaming app featuring DJ mixes by color ghost.">
	<title>Musik</title>
	<link rel="icon" href="assets/icons/favicon16.png" type="image/png" sizes="16x16">
	<link rel="icon" href="assets/icons/favicon32.png" type="image/png" sizes="32x32">
	<link rel="icon" href="assets/icons/favicon64.png" type="image/png" sizes="64x64">
	<link rel="icon" href="assets/icons/favicon128.png" type="image/png" sizes="128x128">
	<link rel="icon" href="assets/icons/favicon256.png" type="image/png" sizes="256x256">
	<link rel="apple-touch-icon" href="assets/icons/apple-touch-icon.png" type="image/png" sizes="180x180">
	<link rel="stylesheet" href="assets/style/style.css">
</head>
<body>
	<main>
		<section class="progress">
			<div class="bar"></div>
		</section>
		<section class="meta">
			<img class="image" src="assets/images/musik001.webp" width="400" height="400" alt="Cover Art">
			<p class="title">The Human Soul</p>
			<p class="artist">color ghost</p>
		</section>
		<section class="playlist">
			<button class="active" aria-label="Play The Human Soul by color ghost" data-id="musik001">
				<p class="track-title">The Human Soul</p>
				<span class="track-length">46:30</span>
			</button>
			<button aria-label="Play Magic of the Mind by color ghost" data-id="musik002">
				<p class="track-title">Magic of the Mind</p>
				<span class="track-length">37:40</span>
			</button>
			<button aria-label="Play One In A Million We Are TWICE by color ghost" data-id="musik003">
				<p class="track-title">One In A Million We Are TWICE</p>
				<span class="track-length">1:07:49</span>
			</button>
			<button aria-label="Play Another TWICE Mix to Feed Your Soul by color ghost" data-id="musik004">
				<p class="track-title">Another TWICE Mix to Feed Your Soul</p>
				<span class="track-length">53:06</span>
			</button>
			<button aria-label="Play Journey of the Mind by color ghost" data-id="musik005">
				<p class="track-title">Journey of the Mind</p>
				<span class="track-length">35:15</span>
			</button>
			<button aria-label="Play Seize the Light by color ghost" data-id="musik006">
				<p class="track-title">Seize the Light</p>
				<span class="track-length">1:07:15</span>
			</button>
		</section>
		<section class="icons">
			<a class="soundcloud" href="https://soundcloud.com/colorghost" target="_blank" aria-label="color ghost SoundCloud page"></a>
			<a class="youtube" href="https://youtube.com/@colorghost" target="_blank" aria-label="color ghost YouTube channel"></a>
		</section>
	</main>
	<script type="module" src="dist/main.js"></script>
</body>
</html>
